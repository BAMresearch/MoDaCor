name: CI-CD

# Controls when the action will run.
on:
  push:
  pull_request:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # check if everything works first
  tests:
    uses: ./.github/workflows/tests.yml

  # make a new version next, release or prerelease
  release:
    needs: [tests]
    uses: ./.github/workflows/release.yml

  build:
    needs: [tests, release]  # build only if all tests are successful
    uses: ./.github/workflows/build.yml
    secrets: inherit

  docs:
    needs: [tests, release]  # get (release) version number first
    uses: ./.github/workflows/docs.yml

  publish:  # needs to be in the top-level .yml for Trusted Publishing to work @pypi
    needs: [build,docs]
    runs-on: 'ubuntu-latest'
    permissions:
      id-token: write
    environment:
      name: pypi
    # Publish package from main branch only, and only if there is a new version
    # errors out otherwise, in any case
    if: github.ref == 'refs/heads/main' && needs.release.outputs.new_version == 'true'
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
