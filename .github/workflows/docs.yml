name: Docs

# Controls when the action will run.
on:
  workflow_call:

# env:
#   DOCS_URL: https://BAMresearch.github.io/MoDaCor
#   COV_REPORT_BASE_DIR: coverage-report  # see pyproject.toml

jobs:
  generate:
    # defining this job separately allows to refer to it later as job.needs dependency
    runs-on: ubuntu-latest
    steps:

      - name: Checking out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setting up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install required system packages
        shell: sh
        run: |
          PLATFORM="$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
          REQFN="ci/requirements_$PLATFORM.txt"
          if [ "$PLATFORM" = "linux" ] && [ -f "$REQFN" ]; then
            sudo apt-get update  # update package DB, to avoid outdated lists
            sudo apt-get -y install $(sed -e '/^\s*#/d' "$REQFN")
          elif [ "$PLATFORM" = "windows" ] && [ -f "$REQFN" ]; then
            choco install $(sed -e '/^\s*#/d' "$REQFN")
          else
            echo "macro sys_install_req(): platform '$PLATFORM' not implemented yet."
          fi

      - name: Install dependencies
        shell: sh
        run: |
          [ -d "/c/miniconda" ] && /c/miniconda/condabin/activate.bat
          python -m pip install --upgrade pip
          python -m pip install --progress-bar=off .[ci]

      - name: Generate documentation
        shell: sh
        run: tox -e docs -v

      - name: Upload docs for finalization later
        uses: actions/upload-artifact@v5
        with:
          name: docs
          path: dist/docs

  coverage:
    name: Coverage to HTML
    needs: generate
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.total.outputs.total }}
    steps:
      - name: Checking out the repo
        uses: actions/checkout@v6

      - name: Setting up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        shell: sh
        run: |
          [ -d "/c/miniconda" ] && /c/miniconda/condabin/activate.bat
          python -m pip install --upgrade pip
          python -m pip install --progress-bar=off .[ci]

      - name: Download coverage data
        uses: actions/download-artifact@v6
        with:
          pattern: coverage.*
          merge-multiple: true

      - name: Combine and report
        id: combine
        shell: sh
        run: |
          set -x
          pwd && ls -la
          coverage combine coverage.*
          python3 -c 'import coverage,pprint; cov=coverage.Coverage(); cov.load();pprint.pprint(list(cov.get_data()._file_map.keys()))'
          coverage html --debug=pathmap

      - name: Upload HTML report
        uses: actions/upload-artifact@v5
        with:
          name: html_report
          path: htmlcov

      - name: Get total
        #id: total
        shell: sh
        run: |
          echo "total=$(coverage report --format=total)" >> $GITHUB_OUTPUT

      - name: Get report dir
        #id: report-dir
        shell: sh
        run: |
          python3 -c 'import toml; reportpath = toml.load("pyproject.toml")["tool"]["coverage"]["report"]["path"]; print(f"{reportpath=}")' >> $GITHUB_OUTPUT

      - name: Get docs URL
        #id: report-dir
        shell: sh
        run: |
          python3 -c 'import toml; docurl = toml.load("pyproject.toml")["project"]["urls"]["documentation"]; print(f"{docurl=}")' >> $GITHUB_OUTPUT

  assemble:
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Compute info for later steps
        id: info
        shell: sh
        run: |
          set -xe
          export SHA10=$(echo ${{ github.sha }} | cut -c 1-10)
          export SLUG=$(date +'%Y%m%d')_$SHA10
          export REPORT_DIR=${{ needs.coverage.outputs.reportpath }}/$SLUG
          export REF="${{ github.ref }}"
          echo "total=${{ needs.coverage.outputs.total }}" >> $GITHUB_ENV
          #echo "sha10=$SHA10" >> $GITHUB_ENV
          #echo "slug=$SLUG" >> $GITHUB_ENV
          echo "report_dir=$REPORT_DIR" >> $GITHUB_ENV
          #echo "branch=${REF#refs/heads/}" >> $GITHUB_ENV

      - name: Summarize
        shell: sh
        run: |
          echo '### Total coverage: ${{ env.total }}%' >> $GITHUB_STEP_SUMMARY

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download previously generated documentation
        uses: actions/download-artifact@v6
        with:
          name: docs
          path: pages

      - name: Download coverage HTML report
        uses: actions/download-artifact@v6
        with:
          name: html_report
          path: pages/${{ env.report_dir }}

      - name: Final touches
        shell: sh
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REDIR_HTML: "pages/${{ needs.coverage.outputs.reportpath }}/index.html"
          BADGE_JSON: "pages/${{ needs.coverage.outputs.reportpath }}/cov.json"
          REPORT_URL: "${{ needs.coverage.outputs.docurl }}/${{ env.report_dir }}"
        run: |
          set -xe
          # Make the redirect to the latest report.
          echo "<html><head>" > "$REDIR_HTML"
          echo "<meta http-equiv='refresh' content='0;url=$REPORT_URL' />" >> "$REDIR_HTML"
          echo "<body>Coverage report redirect..." >> "$REDIR_HTML"
          # Make badge json
          COL_MIN=10; COL_MAX=95;
          HUE=$(python3 -c "print(int((${{ env.total }} - $COL_MIN)/($COL_MAX - $COL_MIN) * 120))")
          echo "{\"schemaVersion\":1,\"label\":\"Coverage\",\"message\":\"${{ env.total }}%\",\"color\":\"hsl($HUE, 100%, 40%)\"}" > "$BADGE_JSON"
          # Commit.
          cd ./pages
          rm -f ${{ env.report_dir }}/.gitignore
          touch .nojekyll  # not a jekyll page here, do not ignore _static
          # ls -la ${{ env.report_dir }} # for debugging
          # ${{ env.report_dir }}/* "${REDIR_HTML#*/}" "${BADGE_JSON#*/}"
          echo "[$REPORT_URL]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages

  # Configure GitHub Pages to Use GitHub Actions as source
  # In repository Settings → Pages, Under "Build and deployment"
  deploy:
    needs: assemble
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
