name: Release

# Controls when the action will run.
on:
  workflow_call:

jobs:
  # make a new version first, release or prerelease
  release:
    # Only run this job if new work is pushed and not on PRs, avoids duplicate runs
    # semantic-release run on the commit and pushes new version to branch
    # on merge there is already a new version in git history, no new commit needed
    # semantic-release github-actions bot can't push to main anyway
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_version }}
    steps:

      # depth=0 is needed for semantic-release
      - name: Checking out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # ensure actual branch name instead of a commit SHA
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup git user
        shell: sh
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Setting up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        shell: sh
        run: |
          [ -d "/c/miniconda" ] && /c/miniconda/condabin/activate.bat
          python -m pip install --upgrade pip
          python -m pip install --progress-bar=off .[ci]

      - name: Determine a version number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: semver
        shell: sh
        run: |
          set -xe
          NEWVER=$(semantic-release version --print)
          [ -z "$NEWVER" ] && exit 1
          if [ "$NEWVER" = "$(semantic-release version --print-last-released 2>/dev/null)" ]; then
            # make this info available for other job down the road
            echo "new_version=false" >> $GITHUB_OUTPUT
          else
            echo "new_version=true" >> $GITHUB_OUTPUT
          fi
          # version number updates with regexp which is not supported by
          # semantic_release.version_variables in pyproject.toml
          sed -i -e "s/v\([0-9]\+\.\)\{2\}\([0-9]\+\)/v$NEWVER/g" README.md
          sed -i -e "/version:/s/\([0-9]\+\.\)\{2\}[0-9]\+/$NEWVER/" .copier-answers.yml
          git add README.md .copier-answers.yml
          # creates a release only if there are relevant changes/commits starting with 'fix/feat()'
          semantic-release version
